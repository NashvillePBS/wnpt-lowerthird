  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

play:flex;align-items:center;gap:12px;font-weight:800;font-size:18px;letter-spacing:-.01em\"><img src=\"576f77cb-a8c3-4e8b-91ad-276201664d87\" alt=\"Nashville PBS\" style=\"height:28px;width:auto;display:block\"><span>- Generate Lower Thirds<\u002Fspan><\u002Fdiv>\n    <div class=\"lt-divider\" style=\"width:1px;height:26px;background:rgba(255,255,255,.28)\"><\u002Fdiv>\n    <div class=\"lt-sub\" style=\"font-weight:500;font-size:13px;color:rgba(255,255,255,.72)\">Add each lower third, save the session as a collection in Airtable<\u002Fdiv>\n    <button sc-camel-on-click=\"{{ configure }}\" title=\"Airtable connection\" class=\"lt-conn\" style=\"margin-left:auto;display:flex;align-items:center;gap:8px;background:{{ connChipBg }};color:#fff;font-family:'PBS Sans',Arial,sans-serif;font-weight:700;font-size:12px;border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:7px 14px;cursor:pointer\">\n      <span style=\"width:8px;height:8px;border-radius:50%;background:{{ connDot }}\"><\u002Fspan>{{ connLabel }}\n    <\u002Fbutton>\n  <\u002Fheader>\n\n  <div id=\"lt-grid\" style=\"flex:1;display:grid;grid-template-columns:420px 1fr;min-height:0\">\n\n    <!-- ── SIDEBAR ── -->\n    <aside id=\"lt-aside\" style=\"background:#fff;border-right:1px solid #d7dbe8;display:flex;flex-direction:column;min-height:0\">\n\n      <!-- editor -->\n      <div style=\"padding:20px 22px 16px;display:flex;flex-direction:column;gap:14px\">\n        <sc-if value=\"{{ hasSelection }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;flex-direction:column;gap:8px\">\n            <label style=\"font-weight:700;font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:#5a6180\">Name<\u002Flabel>\n            <input value=\"{{ selName }}\" sc-camel-on-input=\"{{ onName }}\" sc-camel-on-focus=\"{{ onNameFocus }}\" sc-camel-on-blur=\"{{ onNameBlur }}\" spellcheck=\"true\" placeholder=\"e.g. Name\" style=\"font-family:'PBS Sans',Arial,sans-serif;font-size: ial,sans-serif;font-weight:700;font-size:13px;border:1.5px solid #c7cde0;border-radius:999px;padding:10px 14px;cursor:pointer\" style-hover=\"background:#f4f6fc\">Download ZIP<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ downloadOne }}\" style=\"flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:#fff;color:#0A145A;font-family:'PBS Sans',Arial,sans-serif;font-weight:700;font-size:13px;border:1.5px solid #c7cde0;border-radius:999px;padding:10px 14px;cursor:pointer\" style-hover=\"background:#f4f6fc\">This one<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasStatus }}\"><div style=\"{{ statusStyle }}\">{{ status }}<\u002Fdiv><\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- collections accordion -->\n      <div style=\"border-top:1px solid #e4e7f1\">\n        <button sc-camel-on-click=\"{{ toggleColl }}\" style=\"width:100%;display:flex;align-items:center;gap:10px;background:#f6f7fb;border:none;padding:14px 22px;cursor:pointer;font-family:'PBS Sans',Arial,sans-serif;font-weight:800;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:#5a6180\">\n          <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"{{ chevronStyle }}\"><path d=\"m9 18 6-6-6-6\"><\u002Fpath><\u002Fsvg>\n          Collections\n        <\u002Fbutton>\n        <sc-if value=\"{{ collOpen }}\">\n          <div style=\"padding:14px 22px 20px;display:flex;flex-direction:column;gap:12px;max-height:340px;overflow:auto\">\n            <input value=\"{{ collSearch }}\" sc-camel-on-input=\"{{ onCollSearch }}\" placeholder=\"Search all collections…\" style=\"font-family:'PBS Sans',Arial,sans-serif;font-size:14px;color:#0A145A;padding:10px 13px;border:1.5px solid #c7cde0;border-radius:8px;outline:none;width:100%;box-sizing:border-box\">\n            <sc-if value=\"{{ collListLoading }}\"><div style=\"font-size:13px;color:#8890ad;padding:6px 2px\">Loading…<\u002Fdiv><\u002Fsc-if>\n            <sc-if value=\"{{ collEmpty }}\"><div style=\"font-size:13px;color:#8890ad;padding:6px 2px\">No collections found.<\u002Fdiv><\u002Fsc-if>\n            <sc-for list=\"{{ collections }}\" as=\"c\" hint-placeholder-count=\"3\">\n              <button sc-camel-on-click=\"{{ c.onOpen }}\" style=\"display:flex;align-items:center;gap:12px;text-align:left;background:#fff;border:1.5px solid #e4e7f1;border-radius:10px;padding:12px 14px;cursor:pointer;font-family:'PBS Sans',Arial,sans-serif\" style-hover=\"border-color:#2638C4;background:#f4f6fc\">\n                <div style=\"flex:1;min-width:0\">\n                  <div style=\"font-weight:700;font-size:14px;color:#0A145A;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ c.name }}<\u002Fdiv>\n                  <div style=\"font-weight:500;font-size:12px;color:#8890ad;margin-top:2px\">{{ c.meta }}<\u002Fdiv>\n                <\u002Fdiv>\n                <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#9aa2bd\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m9 18 6-6-6-6\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ hasMore }}\">\n              <button sc-camel-on-click=\"{{ loadMore }}\" style=\"align-self:flex-start;background:transparent;border:none;color:#2638C4;font-family:'PBS Sans',Arial,sans-serif;font-weight:700;font-size:13px;cursor:pointer;padding:4px 2px\">Load more<\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Faside>\n\n    <!-- ── PREVIEW ── -->\n    <main id=\"lt-main\" style=\"position:relative;display:flex;align-items:center;justify-content:center;padding:40px;background-color:#c9cee0;background-image:linear-gradient(45deg,#bcc2d8 25%,transparent 25%),linear-gradient(-45deg,#bcc2d8 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#bcc2d8 75%),linear-gradient(-45deg,transparent 75%,#bcc2d8 75%);background-size:32px 32px;background-position:0 0,0 16px,16px -16px,-16px 0;overflow:hidden\">\n\n      <div style=\"position:absolute;top:18px;left:22px;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#6a7196\">Preview · checkerboard = transparent<\u002Fdiv>\n\n      <div ref=\"{{ scalerRef }}\" style=\"transform-origin:center center\">\n        <div ref=\"{{ capRef }}\" style=\"display:inline-block;padding:60px\">\n          <sc-if value=\"{{ selDark }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:inline-flex;align-items:stretch;box-shadow:0 12px 34px rgba(0,0,0,.32)\">\n              <div style=\"display:flex;flex-direction:column;justify-content:center;gap:7px;background:#0A145A;padding:22px 46px 22px 34px;border-left:6px solid #FFCF00\">\n                <div data-fit=\"1\" style=\"font-weight:800;line-height:1;letter-spacing:-.01em;white-space:nowrap\"><sc-if value=\"{{ hasName }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#fff\">{{ selName }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ noName }}\"><span style=\"color:rgba(255,255,255,.4)\">Name<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                <div style=\"font-weight:500;font-size:19px;line-height:1.1;letter-spacing:.01em\"><sc-if value=\"{{ hasCredit }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:rgba(255,255,255,.82)\">{{ selCredit }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ noCredit }}\"><span style=\"color:rgba(255,255,255,.4)\">Secondary<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ selLightPrev }}\">\n            <div style=\"display:inline-flex;align-items:stretch;box-shadow:0 12px 34px rgba(0,0,0,.22)\">\n              <div style=\"display:flex;flex-direction:column;justify-content:center;gap:7px;background:#fff;padding:22px 46px 22px 34px;border-left:6px solid #2638C4\">\n                <div data-fit=\"1\" style=\"font-weight:800;line-height:1;letter-spacing:-.01em;white-space:nowrap\"><sc-if value=\"{{ hasName }}\"><span style=\"color:#0A145A\">{{ selName }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ noName }}\"><span style=\"color:rgba(10,20,90,.35)\">Name<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                <div style=\"font-weight:500;font-size:19px;line-height:1.1;letter-spacing:.01em\"><sc-if value=\"{{ hasCredit }}\"><span style=\"color:rgba(10,20,90,.72)\">{{ selCredit }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ noCredit }}\"><span style=\"color:rgba(10,20,90,.35)\">Secondary<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <!-- import modal -->\n  <sc-if value=\"{{ importOpen }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(10,20,90,.42);display:flex;align-items:center;justify-content:center;z-index:50;padding:40px\">\n      <div style=\"background:#fff;border-radius:16px;width:560px;max-width:100%;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.4)\">\n        <div style=\"display:flex;align-items:center;gap:12px;padding:20px 24px;border-bottom:1px solid #e4e7f1\">\n          <div style=\"font-weight:800;font-size:17px;color:#0A145A\">Import existing lower third<\u002Fdiv>\n          <button sc-camel-on-click=\"{{ closeImport }}\" style=\"margin-left:auto;display:flex;width:30px;height:30px;align-items:center;justify-content:center;border:none;background:#f4f6fc;border-radius:8px;cursor:pointer;color:#5a6180\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M18 6 6 18\"><\u002Fpath><path d=\"m6 6 12 12\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:16px 24px 0\">\n          <input value=\"{{ importSearch }}\" sc-camel-on-input=\"{{ onImportSearch }}\" placeholder=\"Search by name…\" style=\"font-family:'PBS Sans',Arial,sans-serif;font-size:14px;color:#0A145A;padding:11px 13px;border:1.5px solid #c7cde0;border-radius:8px;outline:none;width:100%;box-sizing:border-box\">\n        <\u002Fdiv>\n        <div style=\"flex:1;overflow:auto;padding:14px 24px;display:flex;flex-direction:column;gap:8px\">\n          <sc-if value=\"{{ importLoading }}\"><div style=\"font-size:13px;color:#8890ad;padding:6px 2px\">Loading…<\u002Fdiv><\u002Fsc-if>\n          <sc-if value=\"{{ importEmpty }}\"><div style=\"font-size:13px;color:#8890ad;padding:6px 2px\">No lower thirds found.<\u002Fdiv><\u002Fsc-if>\n          <sc-for list=\"{{ importResults }}\" as=\"r\" hint-placeholder-count=\"4\">\n            <label style=\"{{ r.style }}\">\n              <input type=\"checkbox\" checked=\"{{ r.checked }}\" sc-camel-on-change=\"{{ r.onToggle }}\" style=\"width:17px;height:17px;accent-color:#2638C4;cursor:pointer\">\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-weight:700;font-size:14px;color:#0A145A;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ r.name }}<\u002Fdiv>\n                <div style=\"font-weight:500;font-size:12px;color:#8890ad;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ r.secondary }}<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ r.light }}\"><span style=\"font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#2638C4;background:#eef1fb;padding:3px 8px;border-radius:999px\">Light<\u002Fspan><\u002Fsc-if>\n            <\u002Flabel>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:12px;padding:16px 24px;border-top:1px solid #e4e7f1\">\n          <div style=\"font-size:13px;color:#8890ad\">{{ importSelectedLabel }}<\u002Fdiv>\n          <button sc-camel-on-click=\"{{ closeImport }}\" style=\"margin-left:auto;background:#fff;color:#0A145A;font-family:'PBS Sans',Arial,sans-serif;font-weight:700;font-size:14px;border:1.5px solid #c7cde0;border-radius:999px;padding:10px 18px;cursor:pointer\">Cancel<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ confirmImport }}\" style=\"background:#2638C4;color:#fff;font-family:'PBS Sans',Arial,sans-serif;font-weight:800;font-size:14px;border:none;border-radius:999px;padding:10px 20px;cursor:pointer\" style-hover=\"background:#0F1E8C\">Add selected<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- hidden render area for batch export -->\n  <div ref=\"{{ exportRef }}\" style=\"position:absolute;left:-99999px;top:0;width:8000px;pointer-events:none\"><\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    entries: [{ name: \"\", credit: \"\", lightMode: false, dirty: true }],\n    selected: 0,\n    collectionId: null,\n    collName: \"\",\n    // collections accordion\n    collOpen: false,\n    collSearch: \"\",\n    collections: [],\n    collNextOffset: null,\n    collListLoading: false,\n    // import modal\n    importOpen: false,\n    importSearch: \"\",\n    importResults: [],\n    importSelected: {},\n    importLoading: false,\n    // status\n    status: \"\",\n    statusKind: \"\",\n    saving: false,\n    workerUrl: \"https://autumn-rain-853e.wnpt-digital.workers.dev\",\n  };\n  static DEFAULT_WORKER = \"https://autumn-rain-853e.wnpt-digital.workers.dev\";\n\n  BASE = 40; MIN = 20; MAX_W = 760; SCALE = 4;\n  _refs = {};\n\n  // ---------- auto-fit ----------\n  fitEl = (el) => {\n    if (!el) return;\n    el.style.fontSize = this.BASE + \"px\";\n    const w = el.scrollWidth;\n    if (w > this.MAX_W) el.style.fontSize = Math.max(this.MIN, Math.floor(this.BASE * (this.MAX_W / w))) + \"px\";\n  };\n  fit = () => {\n    const root = this._refs.rootRef;\n    if (root) root.querySelectorAll(\"[data-fit]\").forEach(this.fitEl);\n    this.scaleToFit();\n  };\n  scaleToFit = () => {\n    const cap = this._refs.capRef, scaler = this._refs.scalerRef;\n    if (!cap || !scaler || !scaler.parentElement) return;\n    const avail = scaler.parentElement.clientWidth - 40;\n    scaler.style.transform = \"none\";\n    const w = cap.offsetWidth;\n    scaler.style.transform = \"scale(\" + (w > avail ? avail / w : 1) + \")\";\n  };\n\n  componentDidMount() {\n    this.setState({ workerUrl: localStorage.getItem(\"lt_worker_url\") || Component.DEFAULT_WORKER });\n    this.fit();\n    if (document.fonts && document.fonts.ready) document.fonts.ready.then(this.fit);\n    this._onResize = () => this.scaleToFit();\n    window.addEventListener(\"resize\", this._onResize);\n    this._beforeUnload = (e) => {\n      if (this.state.entries.some(x => x.dirty) && this.state.entries.some(x => x.name)) {\n        e.preventDefault(); e.returnValue = \"\";\n      }\n    };\n    window.addEventListener(\"beforeunload\", this._beforeUnload);\n    if (window.ResizeObserver) {\n      this._ro = new ResizeObserver(() => this.scaleToFit());\n      if (this._refs.capRef) this._ro.observe(this._refs.capRef);\n      if (this._refs.scalerRef && this._refs.scalerRef.parentElement) this._ro.observe(this._refs.scalerRef.parentElement);\n    }\n  }\n  componentWillUnmount() {\n    window.removeEventListener(\"resize\", this._onResize);\n    window.removeEventListener(\"beforeunload\", this._beforeUnload);\n    if (this._ro) this._ro.disconnect();\n  }\n  componentDidUpdate() { this.fit(); }\n\n  // ---------- connection ----------\n  configure = () => {\n    const cur = this.state.workerUrl || \"\";\n    const v = window.prompt(\"Airtable connection (Cloudflare Worker URL):\", cur);\n    if (v === null) return;\n    const url = v.trim().replace(/\\/+$/, \"\");\n    localStorage.setItem(\"lt_worker_url\", url);\n    this.setState({ workerUrl: url });\n  };\n  api(path) { return this.state.workerUrl.replace(/\\/+$/, \"\") + path; }\n  flash(msg, kind = \"ok\") { this.setState({ status: msg, statusKind: kind }); }\n\n  // ---------- list ops ----------\n  add = () => this.setState(s => ({\n    entries: [...s.entries, { name: \"\", credit: \"\", lightMode: false, dirty: true }],\n    selected: s.entries.length,\n  }));\n  remove = (i) => this.setState(s => {\n    const entries = s.entries.filter((_, idx) => idx !== i);\n    let selected = s.selected;\n    if (selected >= entries.length) selected = entries.length - 1;\n    return { entries, selected: Math.max(0, selected) };\n  });\n  update = (field, v) => this.setState(s => {\n    const entries = s.entries.slice();\n    if (entries[s.selected]) entries[s.selected] = { ...entries[s.selected], [field]: v, dirty: true };\n    return { entries };\n  });\n\n  // ---------- filenames ----------\n  fileNames(entries) {\n    const seen = {};\n    return entries.map((e, i) => {\n      let base = (e.name || (\"lower-third-\" + (i + 1))).toLowerCase().replace(/[^a-z0-9]+/g, \"-\").replace(/^-+|-+$/g, \"\") || (\"lower-third-\" + (i + 1));\n      if (seen[base] != null) { seen[base]++; base = base + \"-\" + seen[base]; } else seen[base] = 1;\n      return base + \".png\";\n    });\n  }\n\n  // ---------- bar builder (honours light mode) ----------\n  buildBar(entry) {\n    const light = !!entry.lightMode;\n    const barBg = light ? \"#fff\" : \"#0A145A\";\n    const line = light ? \"#2638C4\" : \"#FFCF00\";\n    const nameC = light ? \"#0A145A\" : \"#fff\";\n    const secC = light ? \"rgba(10,20,90,.72)\" : \"rgba(255,255,255,.82)\";\n    const shadow = light ? \"0 12px 34px rgba(0,0,0,.22)\" : \"0 12px 34px rgba(0,0,0,.32)\";\n    const wrap = document.createElement(\"div\");\n    wrap.style.cssText = \"display:inline-block;width:max-content;padding:60px;background:transparent\";\n    wrap.innerHTML =\n      '<div style=\"display:inline-flex;align-items:stretch;width:max-content;box-shadow:' + shadow + '\">' +\n        '<div style=\"display:flex;flex-direction:column;justify-content:center;gap:7px;width:max-content;background:' + barBg + ';padding:22px 46px 22px 34px;border-left:6px solid ' + line + ';font-family:\\'PBS Sans\\',Arial,sans-serif\">' +\n          '<div data-fit=\"1\" style=\"font-weight:800;line-height:1;letter-spacing:-.01em;color:' + nameC + ';white-space:nowrap\"><\u002Fdiv>' +\n          '<div style=\"font-weight:500;font-size:19px;line-height:1.1;letter-spacing:.01em;color:' + secC + '\"><\u002Fdiv>' +\n        '<\u002Fdiv>' +\n      '<\u002Fdiv>';\n    wrap.querySelector(\"[data-fit]\").textContent = entry.name || \"\";\n    wrap.querySelectorAll(\"div div div\")[1].textContent = entry.credit || \"\";\n    return wrap;\n  }\n\n  toBlob = (dataUrl) => fetch(dataUrl).then(r => r.blob());\n  captureNode = async (node) => window.htmlToImage.toPng(node, { pixelRatio: this.SCALE });\n\n  // render one entry off-screen → dataURL\n  renderEntry = async (entry) => {\n    const host = this._refs.exportRef;\n    const node = this.buildBar(entry);\n    host.appendChild(node);\n    this.fitEl(node.querySelector(\"[data-fit]\"));\n    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));\n    const url = await this.captureNode(node);\n    host.removeChild(node);\n    return url;\n  };\n\n  downloadOne = async () => {\n    const e = this.state.entries[this.state.selected];\n    if (!e || !window.htmlToImage) return;\n    if (document.fonts && document.fonts.ready) await document.fonts.ready;\n    const url = await this.renderEntry(e);\n    const a = document.createElement(\"a\");\n    a.href = url; a.download = this.fileNames(this.state.entries)[this.state.selected];\n    a.click();\n  };\n\n  buildZipBlob = async (type = \"blob\") => {\n    if (document.fonts && document.fonts.ready) await document.fonts.ready;\n    const names = this.fileNames(this.state.entries);\n    const zip = new window.JSZip();\n    for (let i = 0; i < this.state.entries.length; i++) {\n      const url = await this.renderEntry(this.state.entries[i]);\n      const blob = await this.toBlob(url);\n      zip.file(names[i], blob);\n    }\n    return zip.generateAsync({ type });\n  };\n\n  downloadZip = async () => {\n    if (!this.state.entries.length || !window.JSZip) return;\n    const content = await this.buildZipBlob(\"blob\");\n    const a = document.createElement(\"a\");\n    a.href = URL.createObjectURL(content);\n    a.download = (this.state.collName ? this.fileNames([{ name: this.state.collName }])[0].replace(/\\.png$/, \"\") : \"nashville-pbs-lower-thirds\") + \".zip\";\n    a.click();\n    setTimeout(() => URL.revokeObjectURL(a.href), 4000);\n  };\n\n  // ---------- save to Airtable ----------\n  saveCollection = async () => {\n    if (this.state.saving) return;\n    if (!this.state.workerUrl) { this.flash(\"Set the Airtable connection first (top-right).\", \"err\"); return; }\n    const name = this.state.collName.trim();\n    if (!name) { this.flash(\"Name the collection before saving.\", \"err\"); return; }\n    const valid = this.state.entries.filter(e => e.name.trim());\n    if (!valid.length) { this.flash(\"Add at least one lower third with a name.\", \"err\"); return; }\n    this.setState({ saving: true });\n    this.flash(\"Rendering & saving…\", \"busy\");\n    try {\n      if (document.fonts && document.fonts.ready) await document.fonts.ready;\n      const entries = [];\n      for (const e of valid) {\n        const payload = { id: e.id || undefined, name: e.name, secondary: e.credit, lightMode: !!e.lightMode };\n        if (e.dirty || !e.id) payload.pngBase64 = await this.renderEntry(e);\n        entries.push(payload);\n      }\n      const zipBase64 = await this.buildZipBlob(\"base64\");\n      const res = await fetch(this.api(\"/save\"), {\n        method: \"POST\",\n        headers: { \"Content-Type\": \"application/json\" },\n        body: JSON.stringify({ collectionId: this.state.collectionId, collectionName: name, entries, zipBase64 }),\n      });\n      const data = await res.json();\n      if (!res.ok || data.error) throw new Error(data.error || (\"HTTP \" + res.status));\n      // stamp ids back, clear dirty\n      this.setState(s => {\n        const next = s.entries.slice();\n        let k = 0;\n        for (let i = 0; i < next.length; i++) {\n          if (!next[i].name.trim()) continue;\n          next[i] = { ...next[i], id: data.lowerThirdIds[k++], dirty: false };\n        }\n        return { entries: next, collectionId: data.collectionId };\n      });\n      this.flash(\"Saved “\" + name + \"” to Airtable.\", \"ok\");\n      if (this.state.collOpen) this.loadCollections(true);\n    } catch (err) {\n      this.flash(\"Save failed: \" + (err.message || err), \"err\");\n    } finally {\n      this.setState({ saving: false });\n    }\n  };\n\n  // ---------- collections accordion ----------\n  toggleColl = () => {\n    const open = !this.state.collOpen;\n    this.setState({ collOpen: open });\n    if (open && !this.state.collections.length) this.loadCollections(true);\n  };\n  onCollSearch = (e) => {\n    const v = e.target.value;\n    this.setState({ collSearch: v });\n    clearTimeout(this._collDebounce);\n    this._collDebounce = setTimeout(() => this.loadCollections(true), 300);\n  };\n  loadCollections = async (reset) => {\n    if (!this.state.workerUrl) { this.flash(\"Set the Airtable connection first (top-right).\", \"err\"); return; }\n    this.setState({ collListLoading: true });\n    try {\n      const offset = reset ? \"\" : (this.state.collNextOffset || \"\");\n      const u = new URL(this.api(\"/collections\"));\n      u.searchParams.set(\"limit\", \"5\");\n      if (this.state.collSearch.trim()) u.searchParams.set(\"search\", this.state.collSearch.trim());\n      if (offset) u.searchParams.set(\"offset\", offset);\n      const res = await fetch(u.toString());\n      const data = await res.json();\n      if (data.error) throw new Error(data.error);\n      this.setState(s => ({\n        collections: reset ? data.collections : s.collections.concat(data.collections),\n        collNextOffset: data.nextOffset || null,\n      }));\n    } catch (err) {\n      this.flash(\"Couldn't load collections: \" + (err.message || err), \"err\");\n    } finally {\n      this.setState({ collListLoading: false });\n    }\n  };\n  loadMore = () => this.loadCollections(false);\n\n  openCollection = async (id) => {\n    if (!this.state.workerUrl) return;\n    this.flash(\"Loading collection…\", \"busy\");\n    try {\n      const res = await fetch(this.api(\"/collection?id=\" + encodeURIComponent(id)));\n      const data = await res.json();\n      if (data.error) throw new Error(data.error);\n      const entries = data.entries.map(e => ({ id: e.id, name: e.name, credit: e.secondary, lightMode: !!e.lightMode, dirty: false }));\n      entries.push({ name: \"\", credit: \"\", lightMode: false, dirty: true }); // fresh empty to add\n      this.setState({ entries, selected: entries.length - 1, collectionId: data.id, collName: data.name, collOpen: false });\n      this.flash(\"Opened “\" + data.name + \"”. Click a lower third to edit it.\", \"ok\");\n    } catch (err) {\n      this.flash(\"Couldn't open collection: \" + (err.message || err), \"err\");\n    }\n  };\n\n  // ---------- import existing ----------\n  openImport = () => { this.setState({ importOpen: true, importSearch: \"\", importSelected: {} }); this.loadImport(); };\n  closeImport = () => this.setState({ importOpen: false });\n  onImportSearch = (e) => {\n    const v = e.target.value;\n    this.setState({ importSearch: v });\n    clearTimeout(this._impDebounce);\n    this._impDebounce = setTimeout(() => this.loadImport(), 300);\n  };\n  loadImport = async () => {\n    if (!this.state.workerUrl) { this.flash(\"Set the Airtable connection first (top-right).\", \"err\"); this.setState({ importOpen: false }); return; }\n    this.setState({ importLoading: true });\n    try {\n      const u = new URL(this.api(\"/lower-thirds\"));\n      if (this.state.importSearch.trim()) u.searchParams.set(\"search\", this.state.importSearch.trim());\n      const res = await fetch(u.toString());\n      const data = await res.json();\n      if (data.error) throw new Error(data.error);\n      this.setState({ importResults: data.lowerThirds });\n    } catch (err) {\n      this.flash(\"Import search failed: \" + (err.message || err), \"err\");\n    } finally {\n      this.setState({ importLoading: false });\n    }\n  };\n  toggleImport = (rec) => this.setState(s => {\n    const sel = { ...s.importSelected };\n    if (sel[rec.id]) delete sel[rec.id]; else sel[rec.id] = rec;\n    return { importSelected: sel };\n  });\n  confirmImport = () => {\n    const picked = Object.values(this.state.importSelected);\n    if (!picked.length) { this.setState({ importOpen: false }); return; }\n    this.setState(s => {\n      const have = new Set(s.entries.map(e => e.id).filter(Boolean));\n      const add = picked.filter(p => !have.has(p.id)).map(p => ({ id: p.id, name: p.name, credit: p.secondary, lightMode: !!p.lightMode, dirty: false }));\n      // drop a trailing empty entry so imports sit cleanly\n      let base = s.entries.slice();\n      if (base.length && !base[base.length - 1].name && !base[base.length - 1].id) base = base.slice(0, -1);\n      const entries = base.concat(add);\n      return { entries, selected: entries.length - 1, importOpen: false };\n    });\n  };\n\n  renderVals() {\n    const s = this.state;\n    const sel = s.entries[s.selected];\n    const connected = !!s.workerUrl;\n    const rows = s.entries.map((e, i) => {\n      const active = i === s.selected;\n      return {\n        label: e.name || \"Untitled lower third\",\n        dot: \"width:8px;height:8px;flex:none;border-radius:50%;background:\" + (e.id ? \"#48D3CD\" : \"#c7cde0\"),\n        style: \"display:flex;align-items:center;gap:9px;padding:10px 10px 10px 13px;margin-bottom:4px;border-radius:9px;cursor:pointer;border:1.5px solid \" +\n          (active ? \"#0A145A;background:#eef1fb;color:#0A145A\" : \"transparent;background:#f6f7fb;color:#5a6180\"),\n        onSelect: () => this.setState({ selected: i }),\n        onDelete: (ev) => { ev.stopPropagation(); this.remove(i); },\n      };\n    });\n    const collections = s.collections.map(c => {\n      const when = c.created ? new Date(c.created).toLocaleDateString(undefined, { month: \"short\", day: \"numeric\", year: \"numeric\" }) : \"\";\n      return { name: c.name || \"Untitled collection\", meta: c.count + (c.count === 1 ? \" lower third\" : \" lower thirds\") + (when ? \" · \" + when : \"\"), onOpen: () => this.openCollection(c.id) };\n    });\n    const importResults = s.importResults.map(r => ({\n      name: r.name || \"Untitled\", secondary: r.secondary || \"—\", light: !!r.lightMode,\n      checked: !!s.importSelected[r.id],\n      onToggle: () => this.toggleImport(r),\n      style: \"display:flex;align-items:center;gap:12px;cursor:pointer;padding:11px 13px;border:1.5px solid \" + (s.importSelected[r.id] ? \"#2638C4;background:#f4f6fc\" : \"#e4e7f1;background:#fff\") + \";border-radius:10px\",\n    }));\n    const nPicked = Object.keys(s.importSelected).length;\n    const statusStyle = \"font-size:12.5px;font-weight:600;line-height:1.5;padding:8px 11px;border-radius:8px;\" +\n      (s.statusKind === \"err\" ? \"background:#fdece8;color:#c23a1a\" : s.statusKind === \"busy\" ? \"background:#eef1fb;color:#2638C4\" : \"background:#e8f7f5;color:#0f8a82\");\n    return {\n      rootRef: (el) => { this._refs.rootRef = el; },\n      capRef: (el) => { this._refs.capRef = el; },\n      scalerRef: (el) => { this._refs.scalerRef = el; },\n      exportRef: (el) => { this._refs.exportRef = el; },\n      // connection chip\n      connLabel: connected ? \"Airtable connected\" : \"Connect Airtable\",\n      connDot: connected ? \"#48D3CD\" : \"#FE704E\",\n      connChipBg: \"rgba(255,255,255,.12)\",\n      configure: this.configure,\n      // editor\n      hasSelection: !!sel,\n      selName: sel ? sel.name : \"\",\n      selCredit: sel ? sel.credit : \"\",\n      selLight: !!(sel && sel.lightMode),\n      hasName: !!(sel && sel.name),\n      noName: !(sel && sel.name) && !s.nameFocused,\n      hasCredit: !!(sel && sel.credit),\n      noCredit: !(sel && sel.credit) && !s.creditFocused,\n      selDark: !!sel && !sel.lightMode,\n      selLightPrev: !!sel && !!sel.lightMode,\n      onName: (e) => this.update(\"name\", e.target.value),\n      onCredit: (e) => this.update(\"credit\", e.target.value),\n      onLight: (e) => this.update(\"lightMode\", e.target.checked),\n      onNameFocus: () => this.setState({ nameFocused: true }),\n      onNameBlur: () => this.setState({ nameFocused: false }),\n      onCreditFocus: () => this.setState({ creditFocused: true }),\n      onCreditBlur: () => this.setState({ creditFocused: false }),\n      add: this.add,\n      openImport: this.openImport,\n      // list\n      rows,\n      count: s.entries.length,\n      collTitle: s.collectionId ? (s.collName || \"Collection\") : \"Lower thirds\",\n      isEditingCollection: !!s.collectionId,\n      // save\n      collName: s.collName,\n      onCollName: (e) => this.setState({ collName: e.target.value }),\n      saveCollection: this.saveCollection,\n      saveLabel: s.saving ? \"Saving…\" : (s.collectionId ? \"Update collection\" : \"Save collection\"),\n      downloadZip: this.downloadZip,\n      downloadOne: this.downloadOne,\n      hasStatus: !!s.status,\n      status: s.status,\n      statusStyle,\n      // collections accordion\n      toggleColl: this.toggleColl,\n      collOpen: s.collOpen,\n      chevronStyle: \"transition:transform .15s ease;transform:rotate(\" + (s.collOpen ? \"90\" : \"0\") + \"deg)\",\n      collSearch: s.collSearch,\n      onCollSearch: this.onCollSearch,\n      collections,\n      collListLoading: s.collListLoading,\n      collEmpty: !s.collListLoading && s.collOpen && !collections.length,\n      hasMore: !!s.collNextOffset,\n      loadMore: this.loadMore,\n      // import modal\n      importOpen: s.importOpen,\n      closeImport: this.closeImport,\n      importSearch: s.importSearch,\n      onImportSearch: this.onImportSearch,\n      importResults,\n      importLoading: s.importLoading,\n      importEmpty: !s.importLoading && !importResults.length,\n      confirmImport: this.confirmImport,\n      importSelectedLabel: nPicked ? (nPicked + \" selected\") : \"None selected\",\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
