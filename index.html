  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

px 14px;border:1.5px solid #c7cde0;border-radius:10px;outline:none;width:100%;box-sizing:border-box;resize:vertical;min-height:220px;line-height:1.5\"><\u002Ftextarea>\n          <\u002Fdiv>\n          <sc-if value=\"{{ bulkHasPreview }}\">\n            <div style=\"padding:6px 24px 4px;font-weight:800;font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:#5a6180\">Preview · {{ bulkCount }}<\u002Fdiv>\n            <div style=\"flex:1;overflow:auto;padding:2px 24px 8px;display:flex;flex-direction:column;gap:7px;min-height:40px\">\n              <sc-for list=\"{{ bulkPreview }}\" as=\"p\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;gap:11px;align-items:baseline;border:1px solid #e4e7f1;border-radius:9px;padding:9px 12px\">\n                  <span style=\"flex:none;width:20px;font-weight:800;font-size:12px;color:#b3b9d0\">{{ p.n }}<\u002Fspan>\n                  <div style=\"min-width:0\">\n                    <div style=\"font-weight:700;font-size:14px;color:#0A145A\">{{ p.name }}<\u002Fdiv>\n                    <sc-if value=\"{{ p.hasCredit }}\"><div style=\"font-weight:500;font-size:12.5px;color:#8890ad;white-space:pre-line;line-height:1.4\">{{ p.credit }}<\u002Fdiv><\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:flex;align-items:center;gap:12px;padding:14px 24px;border-top:1px solid #e4e7f1;margin-top:auto\">\n            <div style=\"font-size:13px;color:#8890ad\">{{ bulkCountLabel }}<\u002Fdiv>\n            <button sc-camel-on-click=\"{{ closeBulk }}\" style=\"margin-left:auto;background:#fff;color:#0A145A;font-family:'PBS Sans',Arial,sans-serif;font-weight:700;font-size:14px;border:1.5px solid #c7cde0;border-radius:999px;padding:10px 18px;cursor:pointer\">Cancel<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ confirmBulk }}\" style=\"background:#2638C4;color:#fff;font-family u002Fsc-if>\n            <sc-if value=\"{{ seriesEmpty }}\"><div style=\"font-size:13px;color:#8890ad;padding:6px 2px\">No series found.<\u002Fdiv><\u002Fsc-if>\n            <sc-for list=\"{{ seriesResults }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <button sc-camel-on-click=\"{{ c.onPick }}\" style=\"{{ c.style }}\">\n                <div style=\"flex:1;min-width:0;font-weight:700;font-size:14px;color:#0A145A;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ c.title }}<\u002Fdiv>\n                <sc-if value=\"{{ c.selected }}\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#2638C4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsc-if>\n\n  <!-- ════════ CREDITS GENERATOR ════════ -->\n  <sc-if value=\"{{ isCredits }}\">\n    <header style=\"display:flex;align-items:center;gap:14px;padding:16px 24px;background:#0A145A;color:#fff\">\n      <button sc-camel-on-click=\"{{ backToPicker }}\" title=\"All shows\" style=\"display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.10);color:#fff;font-family:'PBS Sans',Arial,sans-serif;font-weight:700;font-size:13px;border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:8px 14px 8px 11px;cursor:pointer\" style-hover=\"background:rgba(255,255,255,.18)\">\n        <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m15 18-6-6 6-6\"><\u002Fpath><\u002Fsvg>All shows\n      <\u002Fbutton>\n      <div style=\"display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;letter-spacing:-.01em\"><img src=\"863394c3-95e6-4c2b-ad57-6f00e74a4358\" alt=\"Nashville PBS\" style=\"height:24px;width:auto;display:block\"><span style=\"color:rgba(255,255,255,.5);font-weight:500\">/<\u002Fspan><span>Credits<\u002Fspan><\u002Fdiv>\n    <\u002Fheader>\n\n    <div id=\"lt-grid\" style=\"flex:1;display:grid;grid-template-columns:440px 1fr;min-height:0\">\n      <aside id=\"lt-aside\" style=\"background:#fff;border-right:1px solid #d7dbe8;display:flex;flex-direction:column;min-height:0;overflow:auto\">\n        <div style=\"padding:20px 22px 8px;display:flex;flex-direction:column;gap:12px\">\n          <label style=\"font-weight:700;font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:#5a6180\">Credits<\u002Flabel>\n          <sc-for list=\"{{ creditFields }}\" as=\"f\" hint-placeholder-count=\"1\">\n            <div style=\"display:flex;flex-direction:column;gap:6px\">\n              <div style=\"display:flex;align-items:center;gap:8px\">\n                <div style=\"font-weight:800;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#8890ad\">{{ f.label }}<\u002Fdiv>\n                <sc-if value=\"{{ f.showRemove }}\"><button sc-camel-on-click=\"{{ f.onRemove }}\" title=\"Remove page\" style=\"margin-left:auto;display:flex;align-items:center;gap:5px;background:transparent;border:none;color:#c23a1a;font-family:'PBS Sans',Arial,sans-serif;font-weight:700;font-size:12px;cursor:pointer;padding:2px 4px\"><svg width=\"13\" height=\"13\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M18 6 6 18\"><\u002Fpath><path d=\"m6 6 12 12\"><\u002Fpath><\u002Fsvg>Remove<\u002Fbutton><\u002Fsc-if>\n              <\u002Fdiv>\n              <textarea value=\"{{ f.value }}\" sc-camel-on-input=\"{{ f.onInput }}\" spellcheck=\"true\" placeholder=\"{{ f.placeholder }}\" style=\"font-family:'PBS Sans',Arial,sans-serif;font-size:14px;color:#0A145A;padding:12px 13px;border:1.5px solid #c7cde0;border-radius:10px;outline:none;width:100%;box-sizing:border-box;resize:vertical;min-height:180px;line-height:1.5\"><\u002Ftextarea>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <button sc-camel-on-click=\"{{ addCreditsField }}\" style=\"display:flex;align-items:center;justify-content:center;gap:8px;background:#eef1fb;color:#2638C4;font-family:'PBS Sans',Arial,sans-serif;font-weight:700;font-size:13.5px;border:1.5px dashed #b9c2ea;border-radius:999px;padding:11px 16px;cursor:pointer\" style-hover=\"background:#e3e8fa;border-color:#2638C4\">\n            <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>Add page\n          <\u002Fbutton>\n          <div style=\"display:flex;gap:8px;align-items:flex-start;background:#f6f7fb;border:1px solid #e4e7f1;border-radius:10px;padding:11px 13px;font-size:12px;color:#5a6180;line-height:1.5\">\n            <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#2638C4\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:1px\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg>\n            <span>Each block = a <strong style=\"font-weight:700\">role<\u002Fstrong> (first line, small caps) then one or more <strong style=\"font-weight:700\">names<\u002Fstrong> (larger). A <strong style=\"font-weight:700\">blank line<\u002Fstrong> starts the next credit. Use <strong style=\"font-weight:700\">Add page<\u002Fstrong> to put a group on its own page — or type <strong style=\"font-weight:700\">---<\u002Fstrong> on its own line for the same effect. Long pages auto-flow onto more pages. Role + name always stay together.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:12px 22px 8px;display:flex;flex-direction:column;gap:9px\">\n          <label style=\"font-weight:700;font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:#5a6180\">Columns per page<\u002Flabel>\n          <div style=\"display:flex;gap:8px\">\n            <sc-for list=\"{{ colCountOptions }}\" as=\"c\" hint-placeholder-count=\"2\">\n              <button sc-camel-on-click=\"{{ c.onPick }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:12px 22px 8px;display:flex;flex-direction:column;gap:9px\">\n          <label style=\"font-weight:700;font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:#5a6180\">Copyright year<\u002Flabel>\n          <input value=\"{{ copyYearVal }}\" sc-camel-on-input=\"{{ onCopyYear }}\" placeholder=\"{{ copyYearPlaceholder }}\" style=\"font-family:'PBS Sans',Arial,sans-serif;font-size:14px;font-weight:600;color:#0A145A;padding:11px 13px;border:1.5px solid #c7cde0;border-radius:8px;outline:none;width:100%;box-sizing:border-box\">\n          <div style=\"font-size:12px;color:#8890ad;line-height:1.45\">Auto-fills the current year ({{ currentYear }}). Type to override.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:auto;border-top:1px solid #e4e7f1;padding:16px 22px;display:flex;flex-direction:column;gap:10px\">\n          <div style=\"display:flex;gap:10px\">\n            <button sc-camel-on-click=\"{{ downloadCreditsZip }}\" style=\"flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:#2638C4;color:#fff;font-family:'PBS Sans',Arial,sans-serif;font-weight:800;font-size:14px;border:none;border-radius:999px;padding:12px 16px;cursor:pointer\" style-hover=\"background:#0F1E8C\">Download all pages<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ downloadCreditsPage }}\" style=\"flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:#fff;color:#0A145A;font-family:'PBS Sans',Arial,sans-serif;font-weight:700;font-size:14px;border:1.5px solid #c7cde0;border-radius:999px;padding:12px 16px;cursor:pointer\" style-hover=\"background:#f4f6fc\">This page<\u002Fbutton>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasStatus }}\"><div style=\"{{ statusStyle }}\">{{ status }}<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Faside>\n\n      <main id=\"lt-main\" style=\"position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:40px;background-color:#c9cee0;background-image:linear-gradient(45deg,#bcc2d8 25%,transparent 25%),linear-gradient(-45deg,#bcc2d8 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#bcc2d8 75%),linear-gradient(-45deg,transparent 75%,#bcc2d8 75%);background-size:32px 32px;background-position:0 0,0 16px,16px -16px,-16px 0;overflow:hidden\">\n        <div style=\"position:absolute;top:18px;left:22px;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#6a7196\">Preview · 1920×1080 · red outline = title safe (80%)<\u002Fdiv>\n        <div ref=\"{{ creditsScalerRef }}\" style=\"box-shadow:0 20px 60px rgba(10,20,90,.28)\"><\u002Fdiv>\n        <sc-if value=\"{{ creditsMultiPage }}\">\n          <div style=\"display:flex;align-items:center;gap:14px\">\n            <button sc-camel-on-click=\"{{ prevCreditsPage }}\" style=\"display:flex;width:34px;height:34px;align-items:center;justify-content:center;border:1.5px solid #b6bdd4;background:#fff;border-radius:999px;cursor:pointer;color:#2638C4\"><svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m15 18-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n            <div style=\"font-weight:700;font-size:13px;color:#3a4166\">{{ creditsPageLabel }}<\u002Fdiv>\n            <button sc-camel-on-click=\"{{ nextCreditsPage }}\" style=\"display:flex;width:34px;height:34px;align-items:center;justify-content:center;border:1.5px solid #b6bdd4;background:#fff;border-radius:999px;cursor:pointer;color:#2638C4\"><svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m9 18 6-6-6-6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fmain>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div ref=\"{{ exportRef }}\" style=\"position:absolute;left:-99999px;top:0;width:8000px;pointer-events:none\"><\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    screen: \"picker\",\n    show: null,\n    entries: [{ name: \"\", credit: \"\", lightMode: false, dirty: true }],\n    selected: 0,\n    collectionId: null,\n    collName: \"\",\n    collOpen: false,\n    collSearch: \"\",\n    collections: [],\n    collNextOffset: null,\n    collListLoading: false,\n    importOpen: false,\n    importSearch: \"\",\n    importResults: [],\n    importSelected: {},\n    importLoading: false,\n    bulkOpen: false,\n    bulkText: \"\",\n    // content (episode) picker\n    contentId: null,\n    contentTitle: \"\",\n    contentOpen: false,\n    contentSearch: \"\",\n    contentResults: [],\n    contentLoading: false,\n    // series picker (generic brand)\n    pickedSeriesId: null,\n    pickedSeriesTitle: \"\",\n    seriesOpen: false,\n    seriesSearch: \"\",\n    seriesResults: [],\n    seriesLoading: false,\n    // credits generator\n    creditsFields: [\"\"],\n    creditsColCount: 3,\n    creditsPage: 0,\n    creditsPages: [],\n    copyYearOverride: \"\",\n    status: \"\",\n    statusKind: \"\",\n    saving: false,\n    workerUrl: \"https://autumn-rain-853e.wnpt-digital.workers.dev\",\n  };\n  static DEFAULT_WORKER = \"https://autumn-rain-853e.wnpt-digital.workers.dev\";\n\n  SHOWS = {\n    \"wnpt-brand\": { label: \"Nashville PBS Brand\", series: \"WNPT Brand\", style: \"station\", hasLight: true, hasContent: false, canPickSeries: true, base: 40, minF: 20, maxW: 760, scale: 4 },\n    \"slice\": { label: \"A Slice of the Community\", series: \"A Slice of the Community\", style: \"slice\", hasLight: false, hasContent: true, base: 56, minF: 30, maxW: 736, scale: 1 },\n    \"aging\": { label: \"Aging Matters\", series: \"Aging Matters\", style: \"box\", hasLight: false, hasContent: true, base: 60, minF: 30, maxW: 760, scale: 2 },\n    \"cleanslate\": { label: \"Clean Slate with Becky Magura\", series: \"Clean Slate with Becky Magura\", style: \"box\", hasLight: false, hasContent: true, base: 60, minF: 30, maxW: 760, scale: 2 },\n    \"nextdoor\": { label: \"Next Door Neighbors\", series: \"Next Door Neighbors\", style: \"box\", hasLight: false, hasContent: true, base: 60, minF: 30, maxW: 760, scale: 2 },\n    \"station-id\": { label: \"Station ID\", series: null, style: \"station\", logoStation: true, hasLight: false, hasContent: false, noSave: true, base: 56, minF: 28, maxW: 900, scale: 2 },\n  };\n\n  BASE = 40; MIN = 20; MAX_W = 760; SCALE = 4;\n  _refs = {};\n\n  cfg() { return this.SHOWS[this.state.show] || this.SHOWS[\"wnpt-brand\"]; }\n  applyShowMetrics() {\n    const c = this.cfg();\n    this.BASE = c.base; this.MIN = c.minF; this.MAX_W = c.maxW; this.SCALE = c.scale;\n  }\n\n  // ---------- navigation ----------\n  enterShow = (key) => {\n    this.state.show = key;\n    this.applyShowMetrics();\n    this.setState({\n      screen: \"generator\", show: key,\n      entries: [{ name: \"\", credit: \"\", lightMode: false, dirty: true }],\n      selected: 0, collectionId: null, collName: \"\",\n      collOpen: false, collections: [], collNextOffset: null, collSearch: \"\",\n      contentId: null, contentTitle: \"\", contentOpen: false, contentSearch: \"\", contentResults: [],\n      pickedSeriesId: null, pickedSeriesTitle: \"\", seriesOpen: false, seriesSearch: \"\", seriesResults: [],\n      status: \"\", sta
